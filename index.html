    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Arkova verify documents without seeing them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Arkova uses cryptographic fingerprinting (SHA-256) that runs entirely in your browser. We only store the fingerprint — a one-way mathematical proof — never the document itself. This fingerprint is then anchored to a permanent public record."
          }
        },
        {
          "@type": "Question",
          "name": "Can anyone verify a credential?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Verification is completely open. Anyone with a verification link or QR code can confirm a document's authenticity and timestamp independently. No account or software required."
          }
        },
        {
          "@type": "Question",
          "name": "What types of documents can I anchor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any digital file — PDFs, images, spreadsheets, presentations, contracts, certificates, transcripts. If it has a file, it can be fingerprinted and anchored."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from DocuSign or other e-signature tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "E-signature tools prove who signed a document. Arkova proves that a specific document existed at a specific time and has not been altered since. These are complementary — you can anchor a signed document to prove it hasn't changed after signing."
          }
        },
        {
          "@type": "Question",
          "name": "Can I integrate Arkova into my existing systems?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. Our Verification API lets you verify credentials programmatically with a single API call. Batch endpoints support up to 100 verifications per request. Webhook notifications provide real-time events."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data safe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your documents never leave your device — that's our foundational privacy guarantee, not just a feature. Fingerprints are anchored to a public, independently verifiable network. Even if our servers were compromised, your documents remain private because we never had them."
          }
        }
      ]
    }
    </script>
