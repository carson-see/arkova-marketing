            "@type": "Answer",

          }

        {
          "@type": "Question",
          "name": "How much faster is an audit with Arkova going to be vs. the manual process?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typical compliance audits take weeks: compiling evidence across many tools, mapping it to controls, and producing a report. Arkova is designed to map evidence to the rules in your operating regimes automatically, rank gaps by severity and penalty risk, and produce an audit-ready export. Our pilot target is collapsing weeks of audit prep into hours."
          }
        },
        {
          "@type": "Question",
          "name": "Which regulations are on the roadmap?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "US federal (FERPA, HIPAA, SOX, FCRA, GLBA, ADA, FLSA, GINA), EU/UK GDPR, Kenya DPA, Australia APP, Canada PIPEDA, Singapore PDPA, Japan APPI, India DPDP, South Africa POPIA, Nigeria NDPR, Colombia Law 1581, Thailand PDPA, and Malaysia PDPA. Prioritized by pilot-customer footprint."
          }
        },
        {
          "@type": "Question",
          "name": "What will the scorecard show?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A per-jurisdiction posture score and breakdown, a severity-ranked gap list, a prioritized remediation plan, a regulatory-change feed, and an audit-ready export. Designed for GRC leads, CISOs, internal audit, and outside counsel."
          }
        },
        {
          "@type": "Question",
          "name": "Is the evidence chain auditor-grade?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The evidence layer is cryptographic and independently verifiable: every anchor is a SHA-256 fingerprint committed to a public network, and lifecycle events are in an append-only audit log. Our own SOC 2 Type II and ISO 27001 work is in progress."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data safe? Do you see our documents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Documents never leave your device. Fingerprinting is client-side. Only PII-stripped metadata flows to our systems. Even if we were breached, your documents remain private because we never had them."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get access?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Join the waitlist on arkova.ai. We reach out to scope pilots — the best fits right now are compliance teams operating across multiple jurisdictions who are tired of the quarterly audit fire drill."
          }
        }
      ]
    }
    </script>
