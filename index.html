    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much faster is an audit with Arkova vs. the manual process?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typical compliance audits take weeks: compiling evidence across 10+ tools, mapping it to controls, and producing a report. Arkova maps evidence to 100+ rules across 14 regulatory frameworks automatically, scores posture per jurisdiction, ranks gaps by severity and penalty risk, and exports an audit-ready PDF. Weeks become hours."
          }
        },
        {
          "@type": "Question",
          "name": "Which regulations does Arkova cover today?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "US federal (FERPA, HIPAA, SOX, FCRA, GLBA, ADA, FLSA, GINA), EU/UK GDPR, Kenya DPA, Australia APP, Canada PIPEDA, Singapore PDPA, Japan APPI, India DPDP, South Africa POPIA, Nigeria NDPR, Colombia Law 1581, Thailand PDPA, and Malaysia PDPA. 100+ jurisdiction rules across 14 regulatory frameworks with new regimes added continuously."
          }
        },
        {
          "@type": "Question",
          "name": "What does the compliance scorecard show?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A per-jurisdiction score from 0 to 100 with a gauge, a gap list categorized as MISSING / EXPIRED / EXPIRING_SOON / INSUFFICIENT, a prioritized remediation plan scored by severity × penalty risk ÷ effort, a regulatory-change timeline, and an audit-ready PDF export."
          }
        },
        {
          "@type": "Question",
          "name": "How does regulatory-change monitoring work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A cron pipeline watches the jurisdictions you subscribe to. When a rule changes, we compute the impact on your posture (NONE / INFO / IN_APP / EMAIL severity) and send an in-app notification or email so you never find out about a rule change from your auditor."
          }
        },
        {
          "@type": "Question",
          "name": "Is Arkova's evidence auditor-grade?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The evidence chain is cryptographic and independently verifiable: every anchor is a SHA-256 fingerprint committed to a public network, lifecycle events are in an append-only audit log, and every PDF export carries cryptographic receipts. SOC 2 Type II and ISO 27001 work is in progress."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data safe? Do you see our documents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Documents never leave your device. Fingerprinting is client-side. Only PII-stripped metadata flows to our servers. Fingerprints are anchored to a public, independently verifiable network. Even if our systems were breached, your documents remain private because we never had them."
          }
        },
        {
          "@type": "Question",
          "name": "Can I integrate Arkova into my GRC or ticketing stack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Audit API, batch verification endpoints, and regulatory-change webhooks plug into existing GRC platforms, ticketing systems (Jira, ServiceNow), ATS/HRIS, and background-screening workflows. HMAC-signed payloads, rate-limited, with a full audit trail of every call."
          }
        }
      ]
    }
    </script>
